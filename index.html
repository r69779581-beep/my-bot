<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Free Chatbot Website</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        h1 { color: #007bff; }
    </style>
</head>
<body>

    <h1>Welcome to My Chatbot Page!</h1>
    <p>Look at the bottom right corner to talk to my bot.</p>

    <script>
      window.embeddedChatbotConfig = {
        chatbotId: "ravis-workspace",
        domain: "www.chatbase.co"
      }
    </script>
    <script
      src="https://www.chatbase.co/embed.min.js"
      chatbotId="ravis-workspace"
      domain="www.chatbase.co"
      defer>
    </script>

</body>
</html>
